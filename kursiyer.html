<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kursiyer Girişi - Okan Sürücü Kursları</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#c41e3a 0%,#6b0000 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .wrap{background:white;border-radius:24px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}
    .top{background:linear-gradient(135deg,#c41e3a,#8b0000);padding:34px 28px;text-align:center;color:white}
    .top .logo{width:84px;height:84px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;box-shadow:0 6px 20px rgba(0,0,0,.2)}
    .top .logo i{font-size:36px;color:#c41e3a}
    .top h2{font-size:19px;font-weight:700;margin-bottom:4px}
    .top p{font-size:13px;opacity:.88;margin:0}
    .body{padding:30px}
    .tc-wrap{position:relative;margin-bottom:6px}
    .tc-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#c41e3a;font-size:18px}
    .tc-wrap input{width:100%;padding:13px 14px 13px 44px;border:2px solid #e0e0e0;border-radius:12px;font-size:18px;font-weight:600;letter-spacing:3px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
    .tc-wrap input:focus{border-color:#c41e3a}
    .char{font-size:12px;color:#aaa;text-align:right;margin-bottom:16px}
    .submit{width:100%;padding:14px;background:linear-gradient(135deg,#c41e3a,#8b0000);color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s}
    .submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(196,30,58,.4)}
    .submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .alert-box{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:14px;display:none}
    .alert-error{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
    .back{text-align:center;margin-top:20px}
    .back a{color:#c41e3a;font-size:13px;font-weight:600;text-decoration:none}
    /* Exam info */
    .info-card{background:#f0f7ff;border:2px solid #b3d4f5;border-radius:14px;padding:18px;margin-bottom:18px;display:none}
    .info-card .name{font-size:16px;font-weight:700;color:#222;margin-bottom:10px}
    .exam-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #d0e6f8;font-size:13px}
    .exam-row:last-child{border-bottom:none}
    .ed{color:#888;min-width:90px}.es{font-weight:600;color:#333;min-width:60px}
    .ebadge{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
    .ep{background:#d4edda;color:#155724}.ef{background:#f8d7da;color:#721c24}
    .eo{background:#fff3cd;color:#856404}.eg{background:#e9ecef;color:#495057}
    /* Done screen */
    .done{display:none;text-align:center;padding:20px 0}
    .done .di{font-size:60px;color:#28a745;margin-bottom:14px}
    .done h4{font-size:20px;font-weight:700;color:#222;margin-bottom:8px}
    .done p{font-size:14px;color:#666}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo"><i class="fas fa-steering-wheel"></i></div>
    <h2>OKAN SÜRÜCÜ KURSLARI</h2>
    <p>Kursiyer Değerlendirme Sistemi</p>
  </div>
  <div class="body">

    <div id="screenTC">
      <h3 style="font-size:16px;font-weight:700;color:#222;margin-bottom:4px"><i class="fas fa-id-card me-2" style="color:#c41e3a"></i>Kursiyer Girişi</h3>
      <div style="font-size:13px;color:#888;margin-bottom:20px">TC kimlik numaranızla giriş yapın. Şifre gerekmez.</div>

      <div id="alertBox" class="alert-box alert-error"></div>

      <div class="tc-wrap">
        <i class="fas fa-fingerprint"></i>
        <input type="tel" id="tcInput" maxlength="11" placeholder="TC Kimlik No"
               oninput="onTcInput()" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="char"><span id="tcLen">0</span>/11 hane</div>

      <button class="submit" id="btnGiris" onclick="doLogin()" disabled>
        <i class="fas fa-arrow-right me-2"></i>Devam Et
      </button>
    </div>

    <!-- Anket zaten doldurulmuş -->
    <div id="screenDone" class="done">
      <div class="di"><i class="fas fa-check-circle"></i></div>
      <h4>Anket Doldurulmuş</h4>
      <p>Bu öğretmen için daha önce anket doldurdunuz.<br>Tekrar doldurulamaz.</p>
      <div id="doneInfo" style="margin-top:14px;background:white;border:2px solid #e0e0e0;border-radius:10px;padding:12px;font-size:13px;color:#444;text-align:left"></div>
    </div>

    <div class="back"><a href="index.html"><i class="fas fa-arrow-left me-1"></i>Ana Sayfaya Dön</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/.netlify/functions/config"></script>
<script src="js/supabase-client.js"></script>
<script src="js/api.js"></script>
<script>
  initSupabase();

  function onTcInput() {
    const v = document.getElementById('tcInput').value.replace(/\D/g,'');
    document.getElementById('tcInput').value = v;
    document.getElementById('tcLen').textContent = v.length;
    document.getElementById('btnGiris').disabled = v.length !== 11;
    document.getElementById('alertBox').style.display = 'none';
  }

  function showErr(msg) {
    const el = document.getElementById('alertBox');
    el.textContent = msg; el.style.display = 'block';
  }

  const examMap = {
    passed:     { cls:'ep', lbl:'Geçti ✓' },
    failed:     { cls:'ef', lbl:'Kaldı ✗' },
    sick:       { cls:'eo', lbl:'Raporlu'  },
    'not-taken':{ cls:'eg', lbl:'Girmedi'  }
  };

  async function doLogin() {
    const tc = document.getElementById('tcInput').value.trim();
    if (tc.length !== 11) { showErr('Lütfen 11 haneli TC kimlik numaranızı girin.'); return; }

    const btn = document.getElementById('btnGiris');
    btn.disabled = true; btn.textContent = 'Aranıyor...';

    try {
      const student = await API.getStudentByTc(tc);
      if (!student) {
        showErr('Bu TC kimlik numarasına kayıtlı kursiyer bulunamadı. Öğretmeninizle iletişime geçin.');
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-arrow-right me-2"></i>Devam Et';
        return;
      }

      if (student.has_survey) {
        document.getElementById('screenTC').style.display = 'none';
        document.getElementById('screenDone').style.display = 'block';
        document.getElementById('doneInfo').innerHTML =
          `<strong>Öğrenci:</strong> ${student.first_name} ${student.last_name}<br>
           <strong>Öğretmen:</strong> ${student.teacher_name}`;
        return;
      }

      // Ankete git
      location.href = `anket.html?ogretmen=${student.teacher_id}&kursiyer=${encodeURIComponent(tc)}`;

    } catch(e) {
      showErr(e.message || 'Bir hata oluştu. Lütfen tekrar deneyin.');
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-arrow-right me-2"></i>Devam Et';
    }
  }
</script>
</body>
</html>
